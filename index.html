<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Time Trainer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ========== HOME SCREEN ========== */
  #homeScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-y: auto;
    padding-bottom: 40px;
  }

  h1 {
    margin-top: 24px;
    font-size: 28px;
    letter-spacing: 1px;
  }

  .subtitle {
    color: #888;
    margin-top: 4px;
    font-size: 14px;
  }

  .settings {
    background: #16213e;
    border-radius: 12px;
    padding: 20px 28px;
    margin-top: 20px;
    width: 90%;
    max-width: 600px;
  }

  .settings h2 {
    font-size: 16px;
    margin-bottom: 12px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .color-options {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }

  .color-option {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 8px;
    border: 2px solid transparent;
    background: #0f3460;
    transition: all .2s;
  }

  .color-option:hover { background: #1a4a7a; }
  .color-option.selected { border-color: #e94560; }

  .color-swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
  }

  .color-option span { font-size: 14px; }

  .range-group {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
  }

  .range-group label {
    min-width: 160px;
    font-size: 14px;
    color: #ccc;
  }

  .range-group input[type=range] {
    flex: 1;
    accent-color: #e94560;
  }

  .range-group .val {
    min-width: 50px;
    text-align: right;
    font-weight: bold;
    color: #e94560;
  }

  #btnStart {
    margin-top: 24px;
    padding: 16px 64px;
    border: none;
    border-radius: 12px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    background: #e94560;
    color: #fff;
    transition: transform .1s;
  }

  #btnStart:hover { transform: scale(1.04); }
  #btnStart:active { transform: scale(0.97); }

  /* ========== FULLSCREEN FLASH ========== */
  #flashScreen {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999;
    cursor: none;
  }

  #flashHint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    z-index: 10000;
    pointer-events: none;
    transition: opacity 2s;
  }
</style>
</head>
<body>

<!-- ===== HOME SCREEN ===== -->
<div id="homeScreen">
  <h1>Reaction Time Trainer</h1>
  <p class="subtitle">Select colors and timing, then go fullscreen!</p>

  <div class="settings">
    <h2>Colors</h2>
    <div class="color-options" id="colorOptions"></div>

    <h2>Timing (random duration per color)</h2>
    <div class="range-group">
      <label>Min duration</label>
      <input type="range" id="minDuration" min="50" max="2000" step="50" value="200">
      <span class="val" id="minVal">0.2s</span>
    </div>
    <div class="range-group">
      <label>Max duration</label>
      <input type="range" id="maxDuration" min="100" max="5000" step="50" value="1500">
      <span class="val" id="maxVal">1.5s</span>
    </div>
  </div>

  <button id="btnStart">Start Fullscreen</button>
</div>

<!-- ===== FLASH SCREEN ===== -->
<div id="flashScreen"></div>
<div id="flashHint">Press any key or click to return</div>

<script>
// ============ Color Palette ============
const COLORS = [
  { name: 'Red',     hex: '#e80000' },
  { name: 'Blue',    hex: '#0055ff' },
  { name: 'Green',   hex: '#00c853' },
  { name: 'Yellow',  hex: '#ffd600' },
  { name: 'Orange',  hex: '#ff6d00' },
  { name: 'Purple',  hex: '#aa00ff' },
  { name: 'Cyan',    hex: '#00e5ff' },
  { name: 'White',   hex: '#ffffff' },
  { name: 'Black',   hex: '#000000' },
];

let selectedColors = new Set(['Red', 'Blue', 'Green']);
let running = false;
let colorTimeout = null;

// ============ Build color options ============
const colorOptionsEl = document.getElementById('colorOptions');
COLORS.forEach(c => {
  const div = document.createElement('div');
  div.className = 'color-option' + (selectedColors.has(c.name) ? ' selected' : '');
  div.innerHTML = `<div class="color-swatch" style="background:${c.hex}"></div><span>${c.name}</span>`;
  div.addEventListener('click', () => {
    if (selectedColors.has(c.name)) {
      if (selectedColors.size <= 1) return;
      selectedColors.delete(c.name);
      div.classList.remove('selected');
    } else {
      selectedColors.add(c.name);
      div.classList.add('selected');
    }
  });
  colorOptionsEl.appendChild(div);
});

// ============ Range sliders ============
const minSlider = document.getElementById('minDuration');
const maxSlider = document.getElementById('maxDuration');
const minVal = document.getElementById('minVal');
const maxVal = document.getElementById('maxVal');

function fmtSec(ms) { return (ms / 1000).toFixed(1) + 's'; }

minSlider.addEventListener('input', () => {
  if (+minSlider.value > +maxSlider.value) maxSlider.value = minSlider.value;
  minVal.textContent = fmtSec(minSlider.value);
  maxVal.textContent = fmtSec(maxSlider.value);
});
maxSlider.addEventListener('input', () => {
  if (+maxSlider.value < +minSlider.value) minSlider.value = maxSlider.value;
  maxVal.textContent = fmtSec(maxSlider.value);
  minVal.textContent = fmtSec(minSlider.value);
});

// ============ Flash Logic ============
const homeScreen = document.getElementById('homeScreen');
const flashScreen = document.getElementById('flashScreen');
const flashHint = document.getElementById('flashHint');

function getRandomColor() {
  const arr = [...selectedColors];
  const name = arr[Math.floor(Math.random() * arr.length)];
  return COLORS.find(c => c.name === name);
}

function getRandomDuration() {
  const lo = +minSlider.value;
  const hi = +maxSlider.value;
  return lo + Math.random() * (hi - lo);
}

function showNextColor() {
  if (!running) return;
  const color = getRandomColor();
  flashScreen.style.background = color.hex;
  const duration = getRandomDuration();
  colorTimeout = setTimeout(showNextColor, duration);
}

function startFlashing() {
  if (selectedColors.size === 0) return;
  running = true;

  // Show flash screen
  homeScreen.style.display = 'none';
  flashScreen.style.display = 'block';
  flashHint.style.opacity = '1';

  // Fade out hint after 2 seconds
  setTimeout(() => { flashHint.style.opacity = '0'; }, 2000);

  // Try fullscreen
  document.documentElement.requestFullscreen?.().catch(() => {});

  // Start color loop
  showNextColor();
}

function stopFlashing() {
  running = false;
  clearTimeout(colorTimeout);

  // Exit fullscreen
  if (document.fullscreenElement) {
    document.exitFullscreen?.().catch(() => {});
  }

  // Show home screen
  flashScreen.style.display = 'none';
  flashHint.style.opacity = '0';
  homeScreen.style.display = 'flex';
}

// ============ Event Listeners ============
document.getElementById('btnStart').addEventListener('click', startFlashing);

// Press any key or click to return home
document.addEventListener('keydown', (e) => {
  if (running) {
    e.preventDefault();
    stopFlashing();
  }
});

flashScreen.addEventListener('click', () => {
  if (running) stopFlashing();
});
</script>
</body>
</html>
